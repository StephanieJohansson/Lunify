spring.application.name=LifeSync

spring.datasource.url=jdbc:postgresql://localhost:5432/lifesync
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

bring.api.uid=${BRING_API_UID:}
bring.api.key=${BRING_API_KEY:}
bring.client-url=${BRING_CLIENT_URL:http://localhost:5173}
postnord.api.key=${POSTNORD_API_KEY:ac52d1557b344b91f088a000b808ffb9}
postnord.base-url=${POSTNORD_BASE_URL:https://api2.postnord.com/rest}
postnord.locale=${POSTNORD_LOCALE:sv}
lifesync.packages.refresh-delay-ms=${PACKAGE_REFRESH_DELAY_MS:900000}

# Generic SMTP configuration for email verification (no Microsoft app required).
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_READ_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:5000}
lifesync.mail.from=${MAIL_FROM:}
lifesync.client-url=${CLIENT_URL:http://localhost:5173}

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m
server.servlet.session.persistent=false
